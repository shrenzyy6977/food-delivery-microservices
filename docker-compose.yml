version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: user-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3005:3005"
    depends_on:
      - postgres
    environment:
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: users_db
      JWT_SECRET: supersecretkey
  
volumes:
    postgres_data: